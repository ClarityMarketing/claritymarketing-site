<div class="cookie-banner" id="cookieBanner" hidden role="region" aria-label="Cookies">
  <div class="cookie-banner__inner">
    <p class="cookie-banner__text">{{t.cookie.text}}</p>
    <div class="cookie-banner__actions">
      <button type="button" class="btn btn--ghost cookie-banner__btn" data-cookie="decline">{{t.cookie.decline}}</button>
      <button type="button" class="btn btn--dark cookie-banner__btn" data-cookie="accept">{{t.cookie.accept}}</button>
    </div>
  </div>
</div>
