<header class="site-header">

    <img src="{{url.logo}}" alt="" />
    <span>Clarity Marketing</span>
  </a>
  <nav class="site-header__nav">
    <a href="{{url.home}}" class="{{active.home}}">{{t.nav.home}}</a>
    <a href="{{url.service}}" class="{{active.service}}">{{t.nav.service}}</a>

  <div class="site-header__lang">

  </div>
