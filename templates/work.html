<!doctype html>
<html lang="{{t.html_lang}}">
<head>
  <title>{{t.work.title}}</title>
  <meta name="description" content="{{t.work.description}}" />
  {{> head}}
</head>
<body>

  {{> marquee}}
  {{> header}}

  <section class="empty-page reveal">
    <div class="empty-page__inner">
      <div class="empty-page__eyebrow">{{t.work.eyebrow}}</div>
      <h1>{{t.work.hero_title}}</h1>
      <p>{{t.work.hero_p}}</p>
      <div class="empty-page__cta">
        <a href="{{url.home}}" class="btn btn--dark">{{t.work.cta_primary}}</a>
        <a href="{{url.contact}}" class="btn btn--ghost">{{t.work.cta_secondary}}</a>
      </div>
    </div>
  </section>

  {{> footer}}

  <script src="{{url.script}}"></script>
</body>
</html>
