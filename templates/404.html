<!doctype html>
<html lang="{{t.html_lang}}">
<head>
  <title>{{t.notfound.title}}</title>
  <meta name="description" content="{{t.notfound.description}}" />
  <meta name="robots" content="noindex" />
  {{> head}}
</head>
<body>

  {{> marquee}}
  {{> header}}

  <section class="empty-page empty-page--404 reveal">
    <div class="empty-page__inner">
      <div class="empty-page__code">404</div>
      <div class="empty-page__eyebrow">{{t.notfound.eyebrow}}</div>
      <h1>{{t.notfound.hero_title}}</h1>
      <p>{{t.notfound.hero_p}}</p>
      <div class="empty-page__cta">
        <a href="{{url.home}}" class="btn btn--dark">{{t.notfound.cta_primary}}</a>
        <a href="{{url.contact}}" class="btn btn--ghost">{{t.notfound.cta_secondary}}</a>
      </div>
    </div>
  </section>

  {{> footer}}

  <script src="{{url.script}}"></script>
</body>
</html>
