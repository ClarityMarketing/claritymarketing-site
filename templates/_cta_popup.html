<div class="cta-popup" id="ctaPopup" hidden role="dialog" aria-modal="true" aria-labelledby="ctaPopupTitle">
  <div class="cta-popup__backdrop" data-popup-close></div>
  <div class="cta-popup__panel">
    <button type="button" class="cta-popup__close" data-popup-close aria-label="{{t.cta_popup.close_label}}">&times;</button>
    <div class="cta-popup__copy">
      <span class="cta-popup__eyebrow">{{t.cta_popup.eyebrow}}</span>
      <h3 class="cta-popup__title" id="ctaPopupTitle">{{t.cta_popup.title}}</h3>
      <p class="cta-popup__p">{{t.cta_popup.p}}</p>
    </div>

    <form class="cta-popup__form" id="ctaPopupForm" action="https://formsubmit.co/ajax/ella@claritymarketing.dk" method="POST">
      <input type="hidden" name="_subject" value="Ny besked fra claritymarketing.dk" />
      <input type="hidden" name="_template" value="table" />
      <input type="hidden" name="_captcha" value="false" />
      <input type="text" name="name" placeholder="{{t.cta_popup.form_name}}" required />
      <input type="email" name="email" placeholder="{{t.cta_popup.form_email}}" required />
      <textarea name="message" placeholder="{{t.cta_popup.form_message}}" rows="3" required></textarea>
      <button type="submit" class="btn btn--dark cta-popup__submit">{{t.cta_popup.form_submit}}</button>
      <p class="cta-popup__success" hidden>{{t.cta_popup.form_success}}</p>
    </form>

    <div class="cta-popup__or">{{t.cta_popup.or_book}}</div>

    <div class="cta-popup__calendly"
         data-calendly-url="https://calendly.com/ella-claritymarketing/30min?hide_event_type_details=1&hide_gdpr_banner=1&primary_color=5a4a3a&background_color=faf6f0&text_color=1a1612"></div>
  </div>
</div>
